<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리듬게임 개인 기록 관리</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        h1 { margin: 0; color: #333; font-size: 28px; }
        .logout-btn {
            padding: 8px 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .logout-btn:hover { background-color: #c0392b; }

        /* 입력 폼 섹션 */
        .form-section {
            background-color: #fcfcfd;
            border: 1px solid #eaeaea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 35px;
        }
        .form-section h3 { margin-top: 0; margin-bottom: 15px; color: #444; }
        
        .id-input-container {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 20px;
        }
        .id-input-group {
            flex: 1;
            max-width: 250px;
        }
        .id-input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        .id-input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        
        .song-name-display {
            flex: 2;
            padding-bottom: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }
        .new-song-badge {
            color: #e67e22;
            background: #fdf5e6;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 5px;
        }
        .new-title-input {
            margin-top: 5px;
            padding: 8px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #e67e22;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }

        /* 난이도별 4열 카드 배치 */
        .score-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .score-card {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border-top: 5px solid #ccc;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .score-card label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .score-card input, .score-card select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
            margin-bottom: 8px;
        }
        .score-card input { text-align: right; }

        /* 난이도 포인트 컬러 */
        .card-casual { border-top-color: #4d7c53; background-color: #f4fdf5; }
        .card-casual label { color: #4d7c53; }
        
        .card-normal { border-top-color: #bfa128; background-color: #fefdf0; }
        .card-normal label { color: #bfa128; }
        
        .card-hard { border-top-color: #a63244; background-color: #fff5f6; }
        .card-hard label { color: #a63244; }
        
        .card-expert { border-top-color: #7832a6; background-color: #faf4ff; }
        .card-expert label { color: #7832a6; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background-color: #27ae60; }

        /* 테이블 구조 스타일링 */
        h2 { color: #333; margin-bottom: 15px; font-size: 22px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        th:hover { background-color: #f1f2f4; }
        .sort-icon { font-size: 12px; margin-left: 3px; color: #aaa; }

        /* ✨ [수정] 곡 제목 / 작곡가 열 옅은 하늘색 배경 지정 */
        .col-title, .song-info-cell { 
            background-color: rgba(224, 242, 254, 0.4) !important; 
        }

        /* 테이블 배경색 농도 유지 */
        .col-casual { background-color: rgba(77, 124, 83, 0.13); }
        .col-normal { background-color: rgba(191, 161, 40, 0.12); }
        .col-hard { background-color: rgba(166, 50, 68, 0.12); }
        .col-expert { background-color: rgba(120, 50, 166, 0.13); }

        .level-badge {
            display: inline-block;
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
        
        tbody tr:hover { background-color: #f1f3f7; }
        
        .song-info-cell { text-align: left; }
        .song-title { font-size: 15px; color: #222; display: block; margin-bottom: 2px; }
        .song-composer { font-size: 12px; color: #777; display: block; }

        /* 클리어 상태별 텍스트 디자인 효과 */
        .score-text {
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
        }
        
        /* 1. CLEAR: 선명한 주황색 계열 단색 */
        .status-clear {
            color: #f39c12; 
            text-shadow: 0 0 1px rgba(0,0,0,0.1);
        }

        /* 2. FULL COMBO: 노랑 ~ 빨강 스펙트럼 그라데이션 */
        .status-fc {
            background: linear-gradient(90deg, #ffd43b 0%, #ff922b 60%, #f03e3e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0px 1px 1px rgba(0, 0, 0, 0.2)) drop-shadow(0px 0px 1px rgba(133, 100, 4, 0.5));
        }

        /* 3. ALL PERFECT: 파랑 ~ 보라 ~ 핑크 청량한 스펙트럼 그라데이션 */
        .status-ap {
            background: linear-gradient(90deg, #4dabf7 0%, #748ffc 35%, #b57bed 70%, #f783ac 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.15));
        }

        /* ✨ 4. ALL PERFECT+: AP와 색상은 같으나 영롱하게 흐르며 빛나는 그라데이션 애니메이션 추가 */
        .status-applus {
            background: linear-gradient(90deg, #4dabf7 0%, #b57bed 30%, #f783ac 50%, #4dabf7 70%, #b57bed 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shineEffect 2s linear infinite;
            filter: drop-shadow(0px 0px 2px rgba(116, 143, 252, 0.6));
        }

        @keyframes shineEffect {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .status-badge {
            font-size: 10px;
            font-weight: bold;
            width: 32px;
            display: inline-block;
            text-align: center;
            padding: 2px 0;
            border-radius: 3px;
            margin-left: 6px;
            vertical-align: middle;
            box-sizing: border-box;
        }
        .badge-fc { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .badge-ap { background: #e8daff; color: #6f42c1; border: 1px solid #d6bbfb; }
        .badge-applus { 
            background: #e3fafc; 
            color: #0c8599; 
            border: 1px solid #99e9f2;
            box-shadow: 0 0 4px rgba(12, 133, 153, 0.4);
        }

        /* ✨ 전 난이도 AP+ 졸업 곡 셀 전용 붉은색 테마 디자인 */
        .graduated-song-cell {
            background: linear-gradient(135deg, #fff0f2 0%, #ffe3e6 100%) !important;
            border-left: 4px solid #e63946 !important;
            position: relative;
            transition: background 0.3s;
        }
        .graduated-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            color: #d6336c;
            background: #fff0f6;
            border: 1px solid #fcc419;
            padding: 1px 5px;
            border-radius: 4px;
            margin-left: 6px;
            vertical-align: middle;
            box-shadow: 0 0 4px rgba(252, 196, 25, 0.5);
        }

        /* ✨ [수정/신규] 레벨별 통계 전용 표 세로 구분선 및 스타일 */
        .stats-table th, .stats-table td {
            border-right: 1px solid #eaeaea;
        }
        .stats-table th:last-child, .stats-table td:last-child {
            border-right: none;
        }

        .stats-count {
            font-weight: bold;
            font-size: 15px;
        }
        .stats-rate {
            font-size: 12px;
            color: #666;
            margin-left: 4px;
        }
        .total-row {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        .total-row td {
            border-top: 2px solid #ddd;
            border-bottom: 2px solid #ddd;
        }

        /* ✨ [신규] 통계 헤더 악곡 / 채보 수 배지 스타일 */
        .stats-summary-badge {
            font-size: 14px;
            font-weight: normal;
            color: #495057;
            background: #e7f5ff;
            border: 1px solid #a5d8ff;
            padding: 4px 10px;
            border-radius: 15px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🎵 리듬게임 개인 기록 관리</h1>
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>

    <!-- 새 플레이 기록 등록 / 업데이트 폼 -->
    <div class="form-section">
        <h3>새 플레이 기록 등록 / 업데이트</h3>
        
        <div class="id-input-container">
            <div class="id-input-group">
                <label for="songId">곡 ID (songs 테이블 id)</label>
                <input type="number" id="songId" placeholder="예: 1" oninput="updateSongTitleDisplay()">
            </div>
            <div class="song-name-display" id="songTitleDisplay">
                <span style="color:#aaa; font-weight:normal;">곡 ID를 입력하거나 아래 표에서 곡을 선택하세요.</span>
            </div>
        </div>

        <label style="display:block; font-weight:bold; margin-bottom:8px; color:#555;">난이도별 점수 및 클리어 상태 입력</label>
        <div class="score-grid">
            <!-- Casual -->
            <div class="score-card card-casual">
                <label for="casualScore">CASUAL 설정</label>
                <input type="number" id="casualScore" placeholder="점수 입력">
                <select id="casualStatus">
                    <option value="CLEAR">CLEAR</option>
                    <option value="FC">FULL COMBO</option>
                    <option value="AP">ALL PERFECT</option>
                    <option value="AP+">ALL PERFECT+</option>
                </select>
            </div>
            <!-- Normal -->
            <div class="score-card card-normal">
                <label for="normalScore">NORMAL 설정</label>
                <input type="number" id="normalScore" placeholder="점수 입력">
                <select id="normalStatus">
                    <option value="CLEAR">CLEAR</option>
                    <option value="FC">FULL COMBO</option>
                    <option value="AP">ALL PERFECT</option>
                    <option value="AP+">ALL PERFECT+</option>
                </select>
            </div>
            <!-- Hard -->
            <div class="score-card card-hard">
                <label for="hardScore">HARD 설정</label>
                <input type="number" id="hardScore" placeholder="점수 입력">
                <select id="hardStatus">
                    <option value="CLEAR">CLEAR</option>
                    <option value="FC">FULL COMBO</option>
                    <option value="AP">ALL PERFECT</option>
                    <option value="AP+">ALL PERFECT+</option>
                </select>
            </div>
            <!-- Expert -->
            <div class="score-card card-expert">
                <label for="expertScore">EXPERT 설정</label>
                <input type="number" id="expertScore" placeholder="점수 입력">
                <select id="expertStatus">
                    <option value="CLEAR">CLEAR</option>
                    <option value="FC">FULL COMBO</option>
                    <option value="AP">ALL PERFECT</option>
                    <option value="AP+">ALL PERFECT+</option>
                </select>
            </div>
        </div>

        <button class="submit-btn" onclick="saveRecord()">기록 저장하기</button>
    </div>

    <!-- 📊 레벨별 통계 섹션 -->
    <h2 style="margin-top: 40px; display: flex; align-items: center;">
        📊 레벨별 통계 
        <!-- ✨ [신규] 전체 악곡 수 / 채보 수 표시 -->
        <span class="stats-summary-badge" id="statsSummary">
            총 <strong>45</strong>곡 (채보 <strong>180</strong>개)
        </span>
    </h2>
    <!-- ✨ [수정] 구분선 스타일을 위해 stats-table 클래스 추가 -->
    <table class="stats-table" style="margin-bottom: 50px;">
        <thead>
            <tr>
                <th style="width: 12%;">LV</th>
                <th style="width: 22%;">ALL PERFECT+ (비율)</th>
                <th style="width: 22%;">ALL PERFECT (비율)</th>
                <th style="width: 22%;">FULL COMBO (비율)</th>
                <th style="width: 22%;">CLEAR (비율)</th>
            </tr>
        </thead>
        <tbody id="statsTableBody">
            <!-- 자바스크립트에서 동적으로 생성됩니다 -->
        </tbody>
    </table>

    <!-- 내 플레이 기록 목록 -->
    <h2>내 플레이 기록 목록 <span style="font-size:14px; color:#888; font-weight:normal;">(행을 누르면 상단 폼에 자동 입력됩니다)</span></h2>
    <table>
        <thead>
            <tr>
                <!-- ✨ [수정] col-title 클래스 추가 -->
                <th class="col-title" style="width: 32%; text-align: left;" onclick="sortTable('title')">곡 제목 / 작곡가 <span id="icon-title" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #4d7c53;" onclick="sortTable('casual_score')">CASUAL <span id="icon-casual_score" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #bfa128;" onclick="sortTable('normal_score')">NORMAL <span id="icon-normal_score" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #a63244;" onclick="sortTable('hard_score')">HARD <span id="icon-hard_score" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #7832a6;" onclick="sortTable('expert_score')">EXPERT <span id="icon-expert_score" class="sort-icon">↕</span></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td colspan="6" style="text-align:center; padding:30px; color:#888;">데이터를 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
