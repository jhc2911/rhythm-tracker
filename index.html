<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리듬게임 개인 기록 관리</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        h1 { margin: 0; color: #333; font-size: 28px; }
        .logout-btn {
            padding: 8px 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .logout-btn:hover { background-color: #c0392b; }

        /* 입력 폼 섹션 */
        .form-section {
            background-color: #fcfcfd;
            border: 1px solid #eaeaea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 35px;
        }
        .form-section h3 { margin-top: 0; margin-bottom: 15px; color: #444; }
        
        /* 곡 ID 및 제목 연동 영역 */
        .id-input-container {
            display: flex;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 20px;
        }
        .id-input-group {
            flex: 1;
            max-width: 250px;
        }
        .id-input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        .id-input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        
        /* 실시간 곡 제목 표시 영역 */
        .song-name-display {
            flex: 2;
            padding-bottom: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #2c3e50;
        }
        .new-song-badge {
            color: #e67e22;
            background: #fdf5e6;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 5px;
        }
        .new-title-input {
            margin-top: 5px;
            padding: 8px;
            width: 100%;
            max-width: 350px;
            border: 1px solid #e67e22;
            border-radius: 4px;
            font-size: 14px;
            display: none; /* 기본 숨김 */
        }

        /* 난이도별 4열 카드 배치 */
        .score-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .score-card {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border-top: 5px solid #ccc;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        .score-card label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .score-card input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: right;
        }

        /* 난이도 포인트 컬러 */
        .card-casual { border-top-color: #4d7c53; background-color: #f4fdf5; }
        .card-casual label { color: #4d7c53; }
        
        .card-normal { border-top-color: #bfa128; background-color: #fefdf0; }
        .card-normal label { color: #bfa128; }
        
        .card-hard { border-top-color: #a63244; background-color: #fff5f6; }
        .card-hard label { color: #a63244; }
        
        .card-expert { border-top-color: #7832a6; background-color: #faf4ff; }
        .card-expert label { color: #7832a6; }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover { background-color: #27ae60; }

        /* 테이블 구조 스타일링 */
        h2 { color: #333; margin-bottom: 15px; font-size: 22px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        th:hover { background-color: #f1f2f4; }
        .sort-icon { font-size: 12px; margin-left: 3px; color: #aaa; }

        /* [수정] 테이블 배경색 농도 강화 (투명도 약 12~14% 적용) */
        .col-casual { background-color: rgba(77, 124, 83, 0.13); }
        .col-normal { background-color: rgba(191, 161, 40, 0.12); }
        .col-hard { background-color: rgba(166, 50, 68, 0.12); }
        .col-expert { background-color: rgba(120, 50, 166, 0.13); }

        .level-badge {
            display: inline-block;
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
        
        tbody tr:hover {
            background-color: #f1f3f7;
        }
        
        .song-info-cell {
            text-align: left;
        }
        .song-title {
            font-size: 15px;
            color: #222;
            display: block;
            margin-bottom: 2px;
        }
        .song-composer {
            font-size: 12px;
            color: #777;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>🎵 리듬게임 개인 기록 관리</h1>
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </div>

    <!-- 새 플레이 기록 등록 / 업데이트 폼 -->
    <div class="form-section">
        <h3>새 플레이 기록 등록 / 업데이트</h3>
        
        <div class="id-input-container">
            <div class="id-input-group">
                <label for="songId">곡 ID (songs 테이블 id)</label>
                <!-- 입력 시 실시간 반영을 위해 oninput 이벤트 추가 -->
                <input type="number" id="songId" placeholder="예: 1" oninput="updateSongTitleDisplay()">
            </div>
            <!-- 실시간 곡 제목 출력 란 -->
            <div class="song-name-display" id="songTitleDisplay">
                <span style="color:#aaa; font-weight:normal;">곡 ID를 입력하거나 아래 표에서 곡을 선택하세요.</span>
            </div>
        </div>

        <label style="display:block; font-weight:bold; margin-bottom:8px; color:#555;">난이도별 점수 입력</label>
        <div class="score-grid">
            <div class="score-card card-casual">
                <label for="casualScore">Casual 점수</label>
                <input type="number" id="casualScore" placeholder="점수 입력">
            </div>
            <div class="score-card card-normal">
                <label for="normalScore">Normal 점수</label>
                <input type="number" id="normalScore" placeholder="점수 입력">
            </div>
            <div class="score-card card-hard">
                <label for="hardScore">Hard 점수</label>
                <input type="number" id="hardScore" placeholder="점수 입력">
            </div>
            <div class="score-card card-expert">
                <label for="expertScore">Expert 점수</label>
                <input type="number" id="expertScore" placeholder="점수 입력">
            </div>
        </div>

        <button class="submit-btn" onclick="saveRecord()">기록 저장하기</button>
    </div>

    <!-- 내 플레이 기록 목록 -->
    <h2>내 플레이 기록 목록 <span style="font-size:14px; color:#888; font-weight:normal;">(항목을 클릭하면 정렬되며, 행을 누르면 상단 폼에 자동 입력됩니다)</span></h2>
    <table>
        <thead>
            <tr>
                <th style="width: 8%;" onclick="sortTable('song_id')">곡 ID <span id="icon-song_id" class="sort-icon">↕</span></th>
                <th style="width: 32%; text-align: left;" onclick="sortTable('title')">곡 제목 / 작곡가 <span id="icon-title" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #4d7c53;" onclick="sortTable('casual_score')">Casual <span id="icon-casual_score" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #bfa128;" onclick="sortTable('normal_score')">Normal <span id="icon-normal_score" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #a63244;" onclick="sortTable('hard_score')">Hard <span id="icon-hard_score" class="sort-icon">↕</span></th>
                <th style="width: 15%; color: #7832a6;" onclick="sortTable('expert_score')">Expert <span id="icon-expert_score" class="sort-icon">↕</span></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td colspan="6" style="text-align:center; padding:30px; color:#888;">데이터를 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
